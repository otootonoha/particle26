<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Survival Tactical - 1st Person</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050805; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #5f5; pointer-events: none; text-shadow: 2px 2px #000; }
        #hp-bar { width: 250px; height: 15px; border: 2px solid #5f5; margin-top: 10px; background: #111; }
        #hp-inner { width: 100%; height: 100%; background: #f22; transition: 0.1s; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; 
            border: 2px solid rgba(0, 255, 0, 0.5); transform: translate(-50%, -50%); border-radius: 50%;
        }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: -5px; width: 30px; height: 2px; background: rgba(0,255,0,0.5); transform: translateY(-50%); }
        #crosshair::after { content: ''; position: absolute; left: 50%; top: -5px; width: 2px; height: 30px; background: rgba(0,255,0,0.5); transform: translateX(-50%); }
    </style>
</head>
<body>
    <div id="ui">
        <h2>SECTOR 7 - FPS MODE</h2>
        <p>MOUSE: LOOK | CLICK: FIRE | WASD: MOVE</p>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">CONFIRMED KILLS: 0</p>
    </div>
    <div id="crosshair"></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpInner = document.getElementById('hp-inner');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- ゲーム設定 ---
const SENSITIVITY = 0.002;
const MAP_SIZE = 4000;
const FOV = 0.8; // 視野角
let score = 0;
let playerHP = 100;
let recoil = 0;
let keys = {};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let obstacles = [];

const player = {
    x: 0, y: 0, angle: 0, speed: 4.0, radius: 20
};

// 障害物（3D空間の柱として表現）
for(let i=0; i<40; i++) {
    obstacles.push({
        x: (Math.random() - 0.5) * MAP_SIZE,
        y: (Math.random() - 0.5) * MAP_SIZE,
        size: 50 + Math.random() * 100,
        color: `hsl(120, 20%, ${10 + Math.random() * 20}%)`
    });
}

// 入力イベント
canvas.addEventListener('click', () => canvas.requestPointerLock());
window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) player.angle += e.movementX * SENSITIVITY;
});
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', () => {
    if (document.pointerLockElement === canvas && playerHP > 0) {
        bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 25, dist: 0 });
        recoil = 15; // 射撃反動
    }
});

function update() {
    if (playerHP <= 0) return;

    // 移動（プレイヤーの向き基準）
    let dx = 0, dy = 0;
    if (keys['KeyW']) { dx += Math.cos(player.angle); dy += Math.sin(player.angle); }
    if (keys['KeyS']) { dx -= Math.cos(player.angle); dy -= Math.sin(player.angle); }
    if (keys['KeyA']) { dx += Math.sin(player.angle); dy -= Math.cos(player.angle); }
    if (keys['KeyD']) { dx -= Math.sin(player.angle); dy += Math.cos(player.angle); }
    
    player.x += dx * player.speed;
    player.y += dy * player.speed;
    recoil *= 0.8;

    // 自分の弾
    bullets.forEach((b, i) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        b.dist += b.speed;
        if (b.dist > 2000) bullets.splice(i, 1);
        
        enemies.forEach((e, ei) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < 30) {
                enemies.splice(ei, 1);
                bullets.splice(i, 1);
                score++;
                scoreEl.innerText = `CONFIRMED KILLS: ${score}`;
            }
        });
    });

    // 敵の弾
    enemyBullets.forEach((eb, i) => {
        eb.x += Math.cos(eb.angle) * eb.speed;
        eb.y += Math.sin(eb.angle) * eb.speed;
        let d = Math.hypot(player.x - eb.x, player.y - eb.y);
        if (d < 20) {
            playerHP -= 5;
            hpInner.style.width = playerHP + "%";
            enemyBullets.splice(i, 1);
            if (playerHP <= 0) location.reload();
        }
        if (d > 2000) enemyBullets.splice(i, 1);
    });

    // 敵の生成とAI
    if (enemies.length < 10 && Math.random() < 0.03) {
        let a = Math.random() * Math.PI * 2;
        enemies.push({ x: player.x + Math.cos(a)*1000, y: player.y + Math.sin(a)*1000, lastShot: 0 });
    }
    enemies.forEach(e => {
        let d = Math.hypot(player.x - e.x, player.y - e.y);
        let ang = Math.atan2(player.y - e.y, player.x - e.x);
        if (d > 300) {
            e.x += Math.cos(ang) * 2; e.y += Math.sin(ang) * 2;
        } else if (Date.now() - e.lastShot > 2000) {
            enemyBullets.push({ x: e.x, y: e.y, angle: ang, speed: 10 });
            e.lastShot = Date.now();
        }
    });
}

function draw() {
    update();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景（空と地面）
    ctx.fillStyle = '#050a05'; ctx.fillRect(0, 0, canvas.width, canvas.height/2);
    ctx.fillStyle = '#0a100a'; ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

    // 描画オブジェクトを一つにまとめる
    let drawList = [];

    // 障害物をリストに追加
    obstacles.forEach(o => {
        let rel = getRelative(o.x, o.y);
        if (rel.z > 10) drawList.push({ type: 'box', ...rel, size: o.size, color: o.color });
    });

    // 敵をリストに追加
    enemies.forEach(e => {
        let rel = getRelative(e.x, e.y);
        if (rel.z > 10) drawList.push({ type: 'enemy', ...rel });
    });

    // 敵の弾をリストに追加
    enemyBullets.forEach(eb => {
        let rel = getRelative(eb.x, eb.y);
        if (rel.z > 10) drawList.push({ type: 'ebullet', ...rel });
    });

    // 遠い順にソート（Zバッファの代わり）
    drawList.sort((a, b) => b.z - a.z);

    // 描画実行
    drawList.forEach(obj => {
        let screenX = (obj.x / obj.z) * (canvas.width / FOV) + canvas.width / 2;
        let scale = 1000 / obj.z;

        if (obj.type === 'box') {
            ctx.fillStyle = obj.color;
            let w = obj.size * scale;
            let h = 400 * scale;
            ctx.fillRect(screenX - w/2, canvas.height/2 - h, w, h);
            ctx.strokeStyle = '#1f1'; ctx.strokeRect(screenX - w/2, canvas.height/2 - h, w, h);
        } else if (obj.type === 'enemy') {
            ctx.fillStyle = '#f33';
            let h = 120 * scale;
            let w = 60 * scale;
            ctx.fillRect(screenX - w/2, canvas.height/2 - h, w, h);
            // 敵の目（赤く光る）
            ctx.fillStyle = '#fff';
            ctx.fillRect(screenX - w/4, canvas.height/2 - h*0.8, w/5, h/10);
        } else if (obj.type === 'ebullet') {
            ctx.fillStyle = '#f00';
            let s = 10 * scale;
            ctx.beginPath(); ctx.arc(screenX, canvas.height/2 - 30*scale, s, 0, Math.PI*2); ctx.fill();
        }
    });

    // --- 自分の銃（UIとして描画） ---
    drawWeapon();

    requestAnimationFrame(draw);
}

// プレイヤーから見た相対座標（x: 横, z: 奥行き）を計算
function getRelative(tx, ty) {
    let dx = tx - player.x;
    let dy = ty - player.y;
    // プレイヤーの角度に合わせて回転
    let rotX = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let rotZ = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle);
    return { x: rotX, z: rotZ };
}

function drawWeapon() {
    ctx.save();
    let gunX = canvas.width * 0.7;
    let gunY = canvas.height - 200 + recoil;
    
    // 銃身
    ctx.fillStyle = '#222';
    ctx.fillRect(gunX - 40, gunY, 80, 250);
    ctx.fillStyle = '#111';
    ctx.fillRect(gunX - 35, gunY - 20, 70, 50);
    
    // マズル
    if (recoil > 5) {
        ctx.fillStyle = '#ff0';
        ctx.beginPath();
        ctx.arc(gunX, gunY - 40, 30, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
}

draw();
</script>
</body>
</html>
