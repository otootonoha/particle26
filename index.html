<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>2D Top-Down Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Consolas', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; text-shadow: 2px 2px #000; }
        #hp-bar { width: 200px; height: 12px; border: 2px solid #0f0; background: #222; margin: 5px 0; }
        #hp-inner { width: 100%; height: 100%; background: #f00; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">TOP-DOWN OPERATOR</h2>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">ELIMINATIONS: 0</p>
        <p style="font-size: 0.8em">W/A/S/D: MOVE | LEFT CLICK: FIRE</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- ゲーム設定 ---
let score = 0;
let playerHP = 100;
let keys = {};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let obstacles = [];
let damageTexts = [];

const player = { x: 0, y: 0, speed: 7, radius: 22 };
let mousePos = { x: 0, y: 0 };

// 障害物（壁）の配置
for(let i=0; i<30; i++) {
    obstacles.push({
        x: (Math.random() - 0.5) * 4000,
        y: (Math.random() - 0.5) * 4000,
        w: 100 + Math.random() * 300,
        h: 100 + Math.random() * 300
    });
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => {
    mousePos.x = e.clientX;
    mousePos.y = e.clientY;
});

// 左クリック射撃
window.addEventListener('mousedown', (e) => {
    if (e.button === 0 && playerHP > 0) {
        const ang = Math.atan2(mousePos.y - canvas.height/2, mousePos.x - canvas.width/2);
        bullets.push({ 
            x: player.x, 
            y: player.y, 
            vx: Math.cos(ang) * 18, 
            vy: Math.sin(ang) * 18, 
            life: 60 
        });
    }
});

function update() {
    if (playerHP <= 0) return;

    // 移動ロジック (W:上, S:下, A:左, D:右)
    if (keys['KeyW']) player.y -= player.speed;
    if (keys['KeyS']) player.y += player.speed;
    if (keys['KeyA']) player.x -= player.speed;
    if (keys['KeyD']) player.x += player.speed;

    // 自分の弾
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;
        if (b.life <= 0) { bullets.splice(i, 1); continue; }
        
        enemies.forEach((e, ei) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < 25) {
                e.hp -= 34;
                e.flash = 5;
                damageTexts.push({ x: e.x, y: e.y, val: 34, life: 20 });
                bullets.splice(i, 1);
                if (e.hp <= 0) {
                    enemies.splice(ei, 1);
                    score++;
                    document.getElementById('score').innerText = `ELIMINATIONS: ${score}`;
                }
            }
        });
    }

    // 敵の挙動
    if (enemies.length < 12 && Math.random() < 0.04) {
        const ang = Math.random() * Math.PI * 2;
        enemies.push({
            x: player.x + Math.cos(ang) * 1000,
            y: player.y + Math.sin(ang) * 1000,
            hp: 100, maxHp: 100, lastShot: Date.now(), flash: 0
        });
    }

    enemies.forEach(e => {
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        const dist = Math.hypot(player.x - e.x, player.y - e.y);
        
        if (dist > 250) {
            e.x += Math.cos(ang) * 3;
            e.y += Math.sin(ang) * 3;
        }

        if (Date.now() - e.lastShot > 1500 && dist < 700) {
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(ang) * 8, vy: Math.sin(ang) * 8, life: 100 });
            e.lastShot = Date.now();
        }
        if (e.flash > 0) e.flash--;
    });

    // 敵の弾
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        let eb = enemyBullets[i];
        eb.x += eb.vx; eb.y += eb.vy; eb.life--;
        if (Math.hypot(player.x - eb.x, player.y - eb.y) < 20) {
            playerHP -= 10;
            document.getElementById('hp-inner').style.width = Math.max(0, playerHP) + "%";
            enemyBullets.splice(i, 1);
            if (playerHP <= 0) { alert("MISSION FAILED. REBOOTING..."); location.reload(); }
            continue;
        }
        if (eb.life <= 0) enemyBullets.splice(i, 1);
    }

    damageTexts.forEach((t, i) => { t.life--; t.y -= 2; if (t.life <= 0) damageTexts.splice(i, 1); });
}

function draw() {
    update();
    ctx.fillStyle = '#050a05';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // カメラ追従
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    // グリッド背景
    ctx.strokeStyle = '#112211'; ctx.lineWidth = 2;
    for(let i=-2000; i<=2000; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, -2000); ctx.lineTo(i, 2000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2000, i); ctx.lineTo(2000, i); ctx.stroke();
    }

    // 障害物
    ctx.fillStyle = '#1a1a1a';
    obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

    // プレイヤー
    const shootAng = Math.atan2(mousePos.y - canvas.height/2, mousePos.x - canvas.width/2);
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(shootAng);
    ctx.fillStyle = '#0f0';
    ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
    // 銃
    ctx.fillStyle = '#0c0';
    ctx.fillRect(10, -5, 25, 10);
    ctx.restore();

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#f33';
        ctx.beginPath(); ctx.arc(e.x, e.y, 20, 0, Math.PI*2); ctx.fill();
        // 敵HPバー
        ctx.fillStyle = '#222'; ctx.fillRect(e.x - 25, e.y - 35, 50, 6);
        ctx.fillStyle = '#f00'; ctx.fillRect(e.x - 25, e.y - 35, 50 * (e.hp/e.maxHp), 6);
    });

    // 弾丸（光り輝くエフェクト）
    ctx.shadowBlur = 8;
    bullets.forEach(b => {
        ctx.shadowColor = '#fff'; ctx.fillStyle = '#fff';
        ctx.fillRect(b.x-3, b.y-3, 6, 6);
    });
    enemyBullets.forEach(eb => {
        ctx.shadowColor = '#f00'; ctx.fillStyle = '#f88';
        ctx.fillRect(eb.x-3, eb.y-3, 6, 6);
    });
    ctx.shadowBlur = 0;

    // ダメージ数値
    ctx.textAlign = 'center';
    damageTexts.forEach(t => {
        ctx.fillStyle = `rgba(255, 255, 0, ${t.life/20})`;
        ctx.font = 'bold 24px Consolas';
        ctx.fillText(t.val, t.x, t.y);
    });

    ctx.restore();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
