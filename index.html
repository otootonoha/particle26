<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Survival Tactical TPS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0e120e; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #55ff55; pointer-events: none; text-shadow: 1px 1px 2px #000; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            width: 20px; height: 20px; 
            border: 2px solid rgba(0, 255, 0, 0.5); 
            transform: translate(-50%, -50%); border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>SURVIVAL MODE</h1>
        <p>画面クリックで開始 (Escで解除)</p>
        <p>移動: WASD | 射撃: 左クリック</p>
        <p id="score">ELIMINATED: 0</p>
    </div>
    <div id="crosshair"></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let keys = {};
let bullets = [];
let enemies = [];
let obstacles = [];

// --- 設定 ---
const SENSITIVITY = 0.0015; // マウス感度（さらに低く設定）
const OBSTACLE_COUNT = 15;
const MAP_SIZE = 2000;

const player = {
    x: 0, y: 0,
    angle: -Math.PI / 2,
    speed: 3,
    walkCycle: 0,
    radius: 15
};

// 障害物の生成（サバイバル風：コンテナやドラム缶）
for(let i=0; i<OBSTACLE_COUNT; i++) {
    obstacles.push({
        x: Math.random() * MAP_SIZE - MAP_SIZE/2,
        y: Math.random() * MAP_SIZE - MAP_SIZE/2,
        w: Math.random() * 100 + 50,
        h: Math.random() * 100 + 50,
        type: Math.random() > 0.5 ? 'crate' : 'barrel'
    });
}

// ポインターロック（画面クリックでマウスを固定）
canvas.addEventListener('click', () => {
    canvas.requestPointerLock();
});

window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        // movementXを使うことで、画面端に関係なくスムーズに回転
        player.angle += e.movementX * SENSITIVITY;
    }
});

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', () => {
    if (document.pointerLockElement === canvas) {
        bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 20 });
    }
});

function isColliding(x, y, r) {
    for (let o of obstacles) {
        if (x + r > o.x && x - r < o.x + o.w && y + r > o.y && y - r < o.y + o.h) return true;
    }
    return false;
}

function update() {
    let moveX = 0, moveY = 0;
    if (keys['KeyW']) { moveX += Math.cos(player.angle); moveY += Math.sin(player.angle); }
    if (keys['KeyS']) { moveX -= Math.cos(player.angle); moveY -= Math.sin(player.angle); }
    if (keys['KeyA']) { moveX += Math.sin(player.angle); moveY -= Math.cos(player.angle); }
    if (keys['KeyD']) { moveX -= Math.sin(player.angle); moveY += Math.cos(player.angle); }

    let nextX = player.x + moveX * player.speed;
    let nextY = player.y + moveY * player.speed;

    if (!isColliding(nextX, player.y, player.radius)) player.x = nextX;
    if (!isColliding(player.x, nextY, player.radius)) player.y = nextY;

    if (moveX !== 0 || moveY !== 0) player.walkCycle += 0.15;

    // 弾の更新
    for(let i=bullets.length-1; i>=0; i--) {
        let b = bullets[i];
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        if(isColliding(b.x, b.y, 2)) bullets.splice(i, 1);
        
        // 敵との判定
        enemies.forEach((e, ei) => {
            if(Math.hypot(e.x - b.x, e.y - b.y) < 20) {
                enemies.splice(ei, 1);
                bullets.splice(i, 1);
                score++;
                scoreEl.innerText = `ELIMINATED: ${score}`;
            }
        });
    }

    // 敵のスポーンと移動
    if (enemies.length < 5 && Math.random() < 0.02) {
        enemies.push({ x: player.x + (Math.random()-0.5)*1000, y: player.y - 600 });
    }
    enemies.forEach(e => {
        let ang = Math.atan2(player.y - e.y, player.x - e.x);
        let vx = Math.cos(ang) * 1.2;
        let vy = Math.sin(ang) * 1.2;
        if (!isColliding(e.x + vx, e.y + vy, 15)) {
            e.x += vx; e.y += vy;
        }
    });
}

function draw() {
    update();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height * 0.7);
    ctx.rotate(-player.angle - Math.PI/2);
    ctx.translate(-player.x, -player.y);

    // サバイバルな地面（泥っぽい色）
    ctx.fillStyle = '#1a1d1a';
    ctx.fillRect(player.x - 1000, player.y - 1000, 2000, 2000);
    
    // 障害物（コンテナなど）
    obstacles.forEach(o => {
        ctx.fillStyle = o.type === 'crate' ? '#3e2a1a' : '#2a3e3e';
        ctx.fillRect(o.x, o.y, o.w, o.h);
        // ハイライト
        ctx.strokeStyle = '#555';
        ctx.strokeRect(o.x, o.y, o.w, o.h);
    });

    // 敵
    enemies.forEach(e => drawHuman(e.x, e.y, Math.atan2(player.y-e.y, player.x-e.x), '#633', 0));

    // 弾
    ctx.fillStyle = '#ffaa00';
    bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI*2); ctx.fill(); });

    ctx.restore();

    // プレイヤー（固定表示）
    drawHuman(canvas.width / 2, canvas.height * 0.7, Math.PI/2, '#2a4a2a', player.walkCycle);

    requestAnimationFrame(draw);
}

function drawHuman(x, y, angle, color, walk) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    let sway = Math.sin(walk) * 4;
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(0, 0, 18, 22, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#c49c7a'; // 肌
    ctx.beginPath(); ctx.arc(5, 0, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222'; // 銃
    ctx.fillRect(15, -3 + sway, 30, 6);
    ctx.restore();
}

draw();
</script>
</body>
</html>
