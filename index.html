<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tactical FPS - Left Click Fire</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #hp-bar { width: 200px; height: 10px; border: 2px solid #0f0; margin-top: 5px; background: #111; }
        #hp-inner { width: 100%; height: 100%; background: #f00; transition: 0.2s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); pointer-events: none; }
        .ch-line { position: absolute; background: #0f0; transition: 0.05s; }
        .v { left: 11px; top: 0; width: 2px; height: 100%; }
        .h { left: 0; top: 11px; width: 100%; height: 2px; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 1.2em; font-weight: bold;">WEAPON SYSTEM: ONLINE</div>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">KILLS: 0</p>
    </div>

    <div id="crosshair">
        <div id="ch-v" class="ch-line v"></div>
        <div id="ch-h" class="ch-line h"></div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const chV = document.getElementById('ch-v');
const chH = document.getElementById('ch-h');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- 設定 ---
const SENSITIVITY = 0.002;
const MAP_SIZE = 5000;
const FOV = 1.3;
let score = 0;
let playerHP = 100;
let keys = {};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let obstacles = [];
let damageTexts = [];
let shake = 0; // 画面揺れ用

const player = { x: 0, y: 0, angle: 0, speed: 6.5, radius: 20 };

// 障害物
for(let i=0; i<40; i++) {
    obstacles.push({
        x: (Math.random() - 0.5) * MAP_SIZE,
        y: (Math.random() - 0.5) * MAP_SIZE,
        w: 300 + Math.random() * 400,
        h: 300 + Math.random() * 400,
        color: `hsl(140, 10%, ${10 + Math.random() * 5}%)`
    });
}

function checkCollision(x, y, r) {
    for (let o of obstacles) {
        if (x + r > o.x && x - r < o.x + o.w && y + r > o.y && y - r < o.y + o.h) return true;
    }
    return false;
}

canvas.addEventListener('mousedown', (e) => {
    // 左クリック(0)で射撃
    if (document.pointerLockElement === canvas && e.button === 0 && playerHP > 0) {
        bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 100, dist: 0 });
        shake = 10; // 撃った瞬間に揺らす
    } else {
        canvas.requestPointerLock();
    }
});

window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) player.angle += e.movementX * SENSITIVITY;
});
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function getRelative(tx, ty) {
    let dx = tx - player.x, dy = ty - player.y;
    let rotX = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let rotZ = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle);
    return { x: rotX, z: rotZ };
}

function update() {
    if (playerHP <= 0) return;

    // 移動
    let mx = 0, my = 0;
    if (keys['KeyW']) { mx += Math.cos(player.angle); my += Math.sin(player.angle); }
    if (keys['KeyS']) { mx -= Math.cos(player.angle); my -= Math.sin(player.angle); }
    if (keys['KeyA']) { mx += Math.sin(player.angle); my -= Math.cos(player.angle); }
    if (keys['KeyD']) { mx -= Math.sin(player.angle); my += Math.cos(player.angle); }
    
    let nx = player.x + mx * player.speed;
    let ny = player.y + my * player.speed;
    if (!checkCollision(nx, player.y, player.radius)) player.x = nx;
    if (!checkCollision(player.x, ny, player.radius)) player.y = ny;

    // 画面揺れの減衰
    shake *= 0.8;

    // 自分の弾
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        b.dist += b.speed;
        if (b.dist > 4000 || checkCollision(b.x, b.y, 5)) { bullets.splice(i, 1); continue; }
        
        for (let j = enemies.length - 1; j >= 0; j--) {
            let e = enemies[j];
            if (Math.hypot(e.x - b.x, e.y - b.y) < 80) {
                e.hp -= 25; e.hitFlash = 4;
                damageTexts.push({ x: e.x, y: e.y, val: 25, life: 15 });
                bullets.splice(i, 1);
                if (e.hp <= 0) { enemies.splice(j, 1); score++; document.getElementById('score').innerText = `KILLS: ${score}`; }
                break;
            }
        }
    }

    // 敵の弾・スポーン・AI（以前と同様）
    enemyBullets.forEach((eb, i) => {
        eb.x += Math.cos(eb.angle) * eb.speed; eb.y += Math.sin(eb.angle) * eb.speed;
        if (checkCollision(eb.x, eb.y, 5)) { enemyBullets.splice(i, 1); return; }
        if (Math.hypot(player.x - eb.x, player.y - eb.y) < 40) {
            playerHP -= 5; document.getElementById('hp-inner').style.width = Math.max(0, playerHP) + "%";
            enemyBullets.splice(i, 1);
            if (playerHP <= 0) location.reload();
        }
    });

    if (enemies.length < 6 && Math.random() < 0.02) {
        let ang = Math.random() * Math.PI * 2, d = 1500 + Math.random() * 500;
        let ex = player.x + Math.cos(ang) * d, ey = player.y + Math.sin(ang) * d;
        if (!checkCollision(ex, ey, 60)) enemies.push({ x: ex, y: ey, hp: 100, maxHp: 100, lastShot: Date.now(), hitFlash: 0 });
    }

    let aimOnEnemy = false;
    enemies.forEach(e => {
        let rel = getRelative(e.x, e.y);
        if (rel.z > 0 && Math.abs(rel.x / rel.z) < 0.15) aimOnEnemy = true;
        let d = Math.hypot(player.x - e.x, player.y - e.y);
        if (d > 500) {
            let ang = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(ang) * 3; e.y += Math.sin(ang) * 3;
        } else if (Date.now() - e.lastShot > 1500) {
            enemyBullets.push({ x: e.x, y: e.y, angle: Math.atan2(player.y - e.y, player.x - e.x), speed: 12 });
            e.lastShot = Date.now();
        }
        if (e.hitFlash > 0) e.hitFlash--;
    });

    chV.style.background = aimOnEnemy ? "#f00" : "#0f0";
    chH.style.background = aimOnEnemy ? "#f00" : "#0f0";
    damageTexts.forEach((t, i) => { t.life--; t.y -= 3; if (t.life <= 0) damageTexts.splice(i, 1); });
}

function draw() {
    update();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 画面揺れ適用
    let sx = (Math.random() - 0.5) * shake;
    let sy = (Math.random() - 0.5) * shake;
    ctx.save();
    ctx.translate(sx, sy);

    let h_line = canvas.height / 2;
    ctx.fillStyle = '#050805'; ctx.fillRect(-100, -100, canvas.width+200, h_line+100);
    ctx.fillStyle = '#0a0d0a'; ctx.fillRect(-100, h_line, canvas.width+200, canvas.height+100);

    let drawList = [];
    obstacles.forEach(o => {
        let rel = getRelative(o.x + o.w/2, o.y + o.h/2);
        if (rel.z > 100) drawList.push({ type: 'box', ...rel, w: o.w, h: o.h, color: o.color });
    });
    enemies.forEach(e => {
        let rel = getRelative(e.x, e.y);
        if (rel.z > 40) drawList.push({ type: 'enemy', ...rel, hp: e.hp, maxHp: e.maxHp, flash: e.hitFlash });
    });
    bullets.concat(enemyBullets).forEach(b => {
        let rel = getRelative(b.x, b.y);
        if (rel.z > 20) drawList.push({ type: 'bullet', ...rel, color: b.speed > 50 ? '#fff' : '#f44' });
    });
    damageTexts.forEach(t => {
        let rel = getRelative(t.x, t.y);
        if (rel.z > 20) drawList.push({ type: 'text', ...rel, val: t.val, life: t.life });
    });

    drawList.sort((a, b) => b.z - a.z);

    drawList.forEach(obj => {
        let scale = (canvas.width / FOV) / obj.z;
        let screenX = obj.x * scale + canvas.width / 2;

        if (obj.type === 'box') {
            let w = obj.w * scale, h = 1800 * scale;
            ctx.fillStyle = obj.color; ctx.fillRect(screenX - w/2, h_line - h/2, w, h);
        } else if (obj.type === 'enemy') {
            let h = 280 * scale, w = 140 * scale;
            ctx.fillStyle = obj.flash > 0 ? '#f00' : '#444';
            ctx.fillRect(screenX - w/2, h_line - h/2, w, h);
            // HPバー
            ctx.fillStyle = '#111'; ctx.fillRect(screenX - w*0.6, h_line - h/2 - 30 * scale, w*1.2, 10 * scale);
            ctx.fillStyle = '#0f0'; ctx.fillRect(screenX - w*0.6, h_line - h/2 - 30 * scale, (w*1.2) * (obj.hp/obj.maxHp), 10 * scale);
        } else if (obj.type === 'bullet') {
            ctx.fillStyle = obj.color; ctx.beginPath(); ctx.arc(screenX, h_line, 10 * scale, 0, Math.PI*2); ctx.fill();
        } else if (obj.type === 'text') {
            ctx.fillStyle = `rgba(255, 255, 0, ${obj.life / 15})`;
            ctx.font = `bold ${45 * scale}px Impact`; ctx.textAlign = 'center';
            ctx.fillText(obj.val, screenX, h_line - 120 * scale);
        }
    });

    ctx.restore();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
