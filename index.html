<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Top-Down Tactical - Standard Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050805; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #5f5; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #hp-bar { width: 200px; height: 10px; border: 2px solid #5f5; margin-top: 5px; background: #111; }
        #hp-inner { width: 100%; height: 100%; background: #f22; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>MISSION: TOP-DOWN ELIMINATION</h2>
        <p>W/A/S/D: MOVE | LEFT CLICK: SHOOT</p>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">KILLS: 0</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- ゲーム状態 ---
let score = 0;
let playerHP = 100;
let keys = {};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let obstacles = [];
let damageTexts = [];

const player = { x: 0, y: 0, speed: 6, radius: 20 };
let mousePos = { x: 0, y: 0 };

// 障害物生成
for(let i=0; i<20; i++) {
    obstacles.push({
        x: (Math.random() - 0.5) * 3000,
        y: (Math.random() - 0.5) * 3000,
        w: 150 + Math.random() * 200,
        h: 150 + Math.random() * 200
    });
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => {
    mousePos.x = e.clientX;
    mousePos.y = e.clientY;
});

// 左クリック射撃
window.addEventListener('mousedown', (e) => {
    if (e.button === 0 && playerHP > 0) {
        const ang = Math.atan2(mousePos.y - canvas.height/2, mousePos.x - canvas.width/2);
        bullets.push({ 
            x: player.x, 
            y: player.y, 
            vx: Math.cos(ang) * 15, 
            vy: Math.sin(ang) * 15, 
            life: 80 
        });
    }
});

function update() {
    if (playerHP <= 0) return;

    // 標準WASD操作
    if (keys['KeyW']) player.y -= player.speed;
    if (keys['KeyS']) player.y += player.speed;
    if (keys['KeyA']) player.x -= player.speed; // Aで左
    if (keys['KeyD']) player.x += player.speed; // Dで右

    // 自分の弾の更新
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;
        if (b.life <= 0) { bullets.splice(i, 1); continue; }
        
        for (let j = enemies.length - 1; j >= 0; j--) {
            let e = enemies[j];
            if (Math.hypot(e.x - b.x, e.y - b.y) < 25) {
                e.hp -= 34;
                damageTexts.push({ x: e.x, y: e.y, val: 34, life: 20 });
                bullets.splice(i, 1);
                if (e.hp <= 0) {
                    enemies.splice(j, 1);
                    score++;
                    document.getElementById('score').innerText = `KILLS: ${score}`;
                }
                break;
            }
        }
    }

    // 敵の生成と行動
    if (enemies.length < 10 && Math.random() < 0.03) {
        enemies.push({
            x: player.x + (Math.random()-0.5)*2000,
            y: player.y + (Math.random()-0.5)*2000,
            hp: 100, maxHp: 100, lastShot: Date.now()
        });
    }

    enemies.forEach(e => {
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        const dist = Math.hypot(player.x - e.x, player.y - e.y);
        
        if (dist > 300) {
            e.x += Math.cos(ang) * 2.5;
            e.y += Math.sin(ang) * 2.5;
        }

        if (Date.now() - e.lastShot > 1800 && dist < 600) {
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(ang) * 7, vy: Math.sin(ang) * 7, life: 120 });
            e.lastShot = Date.now();
        }
    });

    // 敵の弾
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        let eb = enemyBullets[i];
        eb.x += eb.vx; eb.y += eb.vy; eb.life--;
        if (Math.hypot(player.x - eb.x, player.y - eb.y) < 20) {
            playerHP -= 5;
            document.getElementById('hp-inner').style.width = playerHP + "%";
            enemyBullets.splice(i, 1);
            if (playerHP <= 0) location.reload();
            continue;
        }
        if (eb.life <= 0) enemyBullets.splice(i, 1);
    }

    damageTexts.forEach((t, i) => { t.life--; t.y -= 2; if (t.life <= 0) damageTexts.splice(i, 1); });
}

function draw() {
    update();
    ctx.fillStyle = '#050a05';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    // プレイヤーを画面中心に置くためのカメラ
    ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    // 簡易的な背景グリッド
    ctx.strokeStyle = '#102010'; ctx.lineWidth = 2;
    for(let i=-2000; i<=2000; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, -2000); ctx.lineTo(i, 2000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2000, i); ctx.lineTo(2000, i); ctx.stroke();
    }

    // 障害物
    ctx.fillStyle = '#111b11';
    obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));

    // プレイヤー
    ctx.fillStyle = '#0f0';
    ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
    // 銃身（マウスの方向を指す）
    const shootAng = Math.atan2(mousePos.y - canvas.height/2, mousePos.x - canvas.width/2);
    ctx.strokeStyle = '#0f0'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(player.x, player.y);
    ctx.lineTo(player.x + Math.cos(shootAng)*35, player.y + Math.sin(shootAng)*35); ctx.stroke();

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = '#f33';
        ctx.beginPath(); ctx.arc(e.x, e.y, 20, 0, Math.PI*2); ctx.fill();
        // 敵HPバー
        ctx.fillStyle = '#222'; ctx.fillRect(e.x - 25, e.y - 35, 50, 6);
        ctx.fillStyle = '#f00'; ctx.fillRect(e.x - 25, e.y - 35, 50 * (e.hp/e.maxHp), 6);
    });

    // 弾
    ctx.fillStyle = '#fff';
    bullets.forEach(b => ctx.fillRect(b.x-3, b.y-3, 6, 6));
    ctx.fillStyle = '#f88';
    enemyBullets.forEach(eb => ctx.fillRect(eb.x-3, eb.y-3, 6, 6));

    // ダメージ表示
    ctx.textAlign = 'center';
    damageTexts.forEach(t => {
        ctx.fillStyle = `rgba(255, 255, 0, ${t.life/20})`;
        ctx.font = 'bold 24px Arial';
        ctx.fillText(t.val, t.x, t.y);
    });

    ctx.restore();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
