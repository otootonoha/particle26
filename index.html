<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tactical FPS - High Viewpoint</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050805; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #5f5; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #hp-bar { width: 250px; height: 15px; border: 2px solid #5f5; margin-top: 10px; background: #111; }
        #hp-inner { width: 100%; height: 100%; background: #f22; transition: 0.1s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.5); }
        #crosshair::after { content: ''; position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: rgba(0, 255, 0, 0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <h2>SECTOR 7 - HIGH EYE LEVEL</h2>
        <p>CLICK TO START | WASD: MOVE | MOUSE: INVERTED AIM</p>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">KILLS: 0</p>
    </div>
    <div id="crosshair"></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpInner = document.getElementById('hp-inner');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- 設定 ---
const SENSITIVITY = 0.0015; 
const MAP_SIZE = 5000;
const FOV = 1.0; 
let score = 0;
let playerHP = 100;
let recoil = 0;
let keys = {};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let obstacles = [];

const player = { x: 0, y: 0, angle: 0, speed: 5.0, radius: 25 };

// 障害物配置
for(let i=0; i<45; i++) {
    obstacles.push({
        x: (Math.random() - 0.5) * MAP_SIZE,
        y: (Math.random() - 0.5) * MAP_SIZE,
        w: 300 + Math.random() * 400,
        h: 300 + Math.random() * 400,
        color: `hsl(120, 5%, ${8 + Math.random() * 5}%)`
    });
}

function checkCollision(x, y, r = 5) {
    for (let o of obstacles) {
        if (x + r > o.x && x - r < o.x + o.w && y + r > o.y && y - r < o.y + o.h) return true;
    }
    return false;
}

function getSafeLocation() {
    let x, y, attempts = 0;
    while(attempts < 50) {
        let ang = Math.random() * Math.PI * 2;
        let dist = 1500 + Math.random() * 1000;
        x = player.x + Math.cos(ang) * dist;
        y = player.y + Math.sin(ang) * dist;
        if (!checkCollision(x, y, 60)) return { x, y };
        attempts++;
    }
    return { x: 2500, y: 2500 };
}

canvas.addEventListener('click', () => canvas.requestPointerLock());

// マウス操作を反転 (movementX をマイナスで加算)
window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        player.angle -= e.movementX * SENSITIVITY; 
    }
});

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', () => {
    if (document.pointerLockElement === canvas && playerHP > 0) {
        bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 75, dist: 0 });
        recoil = 15;
    }
});

function getRelative(tx, ty) {
    let dx = tx - player.x;
    let dy = ty - player.y;
    let rotX = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let rotZ = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle);
    return { x: rotX, z: rotZ };
}

function update() {
    if (playerHP <= 0) return;

    let mx = 0, my = 0;
    if (keys['KeyW']) { mx += Math.cos(player.angle); my += Math.sin(player.angle); }
    if (keys['KeyS']) { mx -= Math.cos(player.angle); my -= Math.sin(player.angle); }
    if (keys['KeyA']) { mx += Math.sin(player.angle); my -= Math.cos(player.angle); }
    if (keys['KeyD']) { mx -= Math.sin(player.angle); my += Math.cos(player.angle); }
    
    let nx = player.x + mx * player.speed;
    let ny = player.y + my * player.speed;
    if (!checkCollision(nx, player.y, player.radius)) player.x = nx;
    if (!checkCollision(player.x, ny, player.radius)) player.y = ny;
    
    recoil *= 0.85;

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        b.dist += b.speed;
        if (b.dist > 4000 || checkCollision(b.x, b.y, 5)) { bullets.splice(i, 1); continue; }
        for (let j = enemies.length - 1; j >= 0; j--) {
            if (Math.hypot(enemies[j].x - b.x, enemies[j].y - b.y) < 70) {
                enemies.splice(j, 1);
                bullets.splice(i, 1);
                score++;
                scoreEl.innerText = `KILLS: ${score}`;
                break;
            }
        }
    }

    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        let eb = enemyBullets[i];
        eb.x += Math.cos(eb.angle) * eb.speed;
        eb.y += Math.sin(eb.angle) * eb.speed;
        if (checkCollision(eb.x, eb.y, 5)) { enemyBullets.splice(i, 1); continue; }
        if (Math.hypot(player.x - eb.x, player.y - eb.y) < 40) {
            playerHP -= 10;
            hpInner.style.width = Math.max(0, playerHP) + "%";
            enemyBullets.splice(i, 1);
            if (playerHP <= 0) location.reload();
        }
    }

    if (enemies.length < 5 && Math.random() < 0.015) {
        let p = getSafeLocation();
        enemies.push({ x: p.x, y: p.y, lastShot: Date.now() + 800 });
    }

    enemies.forEach(e => {
        let d = Math.hypot(player.x - e.x, player.y - e.y);
        let ang = Math.atan2(player.y - e.y, player.x - e.x);
        if (d > 700) {
            let vx = Math.cos(ang) * 2.5;
            let vy = Math.sin(ang) * 2.5;
            if (!checkCollision(e.x + vx, e.y + vy, 35)) { e.x += vx; e.y += vy; }
        } else if (Date.now() - e.lastShot > 2200) {
            enemyBullets.push({ x: e.x, y: e.y, angle: ang, speed: 14 });
            e.lastShot = Date.now();
        }
    });
}

function draw() {
    update();
    
    // 背景: ホライゾンをさらに下げて視点を高く見せる
    let horizon = canvas.height * 0.7; 
    ctx.fillStyle = '#050a05'; ctx.fillRect(0, 0, canvas.width, horizon);
    ctx.fillStyle = '#080d08'; ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);

    let drawList = [];
    obstacles.forEach(o => {
        let rel = getRelative(o.x + o.w/2, o.y + o.h/2);
        if (rel.z > 50) drawList.push({ type: 'box', ...rel, w: o.w, h: o.h, color: o.color });
    });
    enemies.forEach(e => {
        let rel = getRelative(e.x, e.y);
        if (rel.z > 20) drawList.push({ type: 'enemy', ...rel });
    });
    bullets.concat(enemyBullets).forEach(b => {
        let rel = getRelative(b.x, b.y);
        if (rel.z > 10) drawList.push({ type: 'bullet', ...rel, color: b.speed > 30 ? '#0f0' : '#f00' });
    });

    drawList.sort((a, b) => b.z - a.z);

    drawList.forEach(obj => {
        let scale = (canvas.width / FOV) / obj.z;
        let screenX = obj.x * scale + canvas.width / 2;

        if (obj.type === 'box') {
            let w = obj.w * scale;
            let h = 2000 * scale; // 壁を高くして見下ろし感を出す
            ctx.fillStyle = obj.color;
            ctx.fillRect(screenX - w/2, horizon - h, w, h);
            ctx.strokeStyle = '#1a331a'; ctx.strokeRect(screenX - w/2, horizon - h, w, h);
        } else if (obj.type === 'enemy') {
            let h = 300 * scale; 
            let w = 150 * scale;
            ctx.fillStyle = '#622';
            ctx.fillRect(screenX - w/2, horizon - h, w, h);
            ctx.fillStyle = '#f00'; ctx.fillRect(screenX - w/2, horizon - h, w, h/6);
        } else if (obj.type === 'bullet') {
            let s = 8 * scale;
            ctx.fillStyle = obj.color;
            ctx.beginPath(); ctx.arc(screenX, horizon - 150 * scale, s, 0, Math.PI*2); ctx.fill();
        }
    });

    // 銃の位置を調整
    ctx.save();
    let gx = canvas.width * 0.8, gy = canvas.height - 150 + recoil;
    ctx.fillStyle = '#111'; ctx.fillRect(gx - 40, gy, 80, 400);
    ctx.fillStyle = '#000'; ctx.fillRect(gx - 35, gy - 15, 70, 40);
    ctx.restore();

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
