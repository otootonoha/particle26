<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Survival Tactical - Combat</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0e120e; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #5f5; pointer-events: none; }
        #hp-bar { width: 200px; height: 20px; border: 2px solid #5f5; margin-top: 10px; }
        #hp-inner { width: 100%; height: 100%; background: #f22; transition: 0.3s; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; 
            border: 1px solid rgba(0, 255, 0, 0.8); transform: translate(-50%, -50%); border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>SECTOR 7 - ENGAGED</h1>
        <p>CLICK TO START | WASD TO MOVE</p>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">KILLS: 0</p>
    </div>
    <div id="crosshair"></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpInner = document.getElementById('hp-inner');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- 設定 ---
const SENSITIVITY = 0.0008; // さらに低感度（精密射撃用）
const MAP_SIZE = 2500;
let score = 0;
let playerHP = 100;
let keys = {};
let bullets = [];     // 自分の弾
let enemyBullets = []; // 敵の弾
let enemies = [];
let obstacles = [];

const player = {
    x: 0, y: 0, angle: -Math.PI / 2, speed: 2.8, radius: 15, walkCycle: 0
};

// 障害物生成
for(let i=0; i<20; i++) {
    obstacles.push({
        x: Math.random() * MAP_SIZE - MAP_SIZE/2,
        y: Math.random() * MAP_SIZE - MAP_SIZE/2,
        w: 80 + Math.random() * 120,
        h: 80 + Math.random() * 120
    });
}

canvas.addEventListener('click', () => canvas.requestPointerLock());
window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) player.angle += e.movementX * SENSITIVITY;
});
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', () => {
    if (document.pointerLockElement === canvas && playerHP > 0) {
        bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 18 });
    }
});

function isColliding(x, y, r) {
    for (let o of obstacles) {
        if (x + r > o.x && x - r < o.x + o.w && y + r > o.y && y - r < o.y + o.h) return true;
    }
    return false;
}

function update() {
    if (playerHP <= 0) return;

    let moveX = 0, moveY = 0;
    if (keys['KeyW']) { moveX += Math.cos(player.angle); moveY += Math.sin(player.angle); }
    if (keys['KeyS']) { moveX -= Math.cos(player.angle); moveY -= Math.sin(player.angle); }
    if (keys['KeyA']) { moveX += Math.sin(player.angle); moveY -= Math.cos(player.angle); }
    if (keys['KeyD']) { moveX -= Math.sin(player.angle); moveY += Math.cos(player.angle); }

    let nextX = player.x + moveX * player.speed;
    let nextY = player.y + moveY * player.speed;
    if (!isColliding(nextX, player.y, player.radius)) player.x = nextX;
    if (!isColliding(player.x, nextY, player.radius)) player.y = nextY;
    if (moveX !== 0 || moveY !== 0) player.walkCycle += 0.12;

    // 自分の弾
    bullets.forEach((b, i) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        if (isColliding(b.x, b.y, 2)) bullets.splice(i, 1);
        enemies.forEach((e, ei) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < 20) {
                enemies.splice(ei, 1);
                bullets.splice(i, 1);
                score++;
                scoreEl.innerText = `KILLS: ${score}`;
            }
        });
    });

    // 敵の弾
    enemyBullets.forEach((eb, i) => {
        eb.x += Math.cos(eb.angle) * eb.speed;
        eb.y += Math.sin(eb.angle) * eb.speed;
        if (isColliding(eb.x, eb.y, 2)) enemyBullets.splice(i, 1);
        if (Math.hypot(player.x - eb.x, player.y - eb.y) < 15) {
            playerHP -= 10;
            hpInner.style.width = playerHP + "%";
            enemyBullets.splice(i, 1);
            if (playerHP <= 0) alert("MISSION FAILED - 最終スコア: " + score);
        }
    });

    // 敵のスポーンとAI
    if (enemies.length < 6 && Math.random() < 0.015) {
        enemies.push({ x: player.x + (Math.random()-0.5)*1200, y: player.y + (Math.random()-0.5)*1200, lastShot: 0 });
    }
    enemies.forEach(e => {
        let dist = Math.hypot(player.x - e.x, player.y - e.y);
        let ang = Math.atan2(player.y - e.y, player.x - e.x);
        
        if (dist > 250) { // 一定距離まで近づく
            let vx = Math.cos(ang) * 1.5;
            let vy = Math.sin(ang) * 1.5;
            if (!isColliding(e.x + vx, e.y + vy, 15)) { e.x += vx; e.y += vy; }
        } else { // 射程内なら射撃
            if (Date.now() - e.lastShot > 1500) { // 1.5秒間隔
                enemyBullets.push({ x: e.x, y: e.y, angle: ang, speed: 8 });
                e.lastShot = Date.now();
            }
        }
    });
}

function draw() {
    update();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height * 0.7);
    ctx.rotate(-player.angle - Math.PI/2);
    ctx.translate(-player.x, -player.y);

    // 背景と障害物
    ctx.fillStyle = '#1a1a14'; ctx.fillRect(player.x-1500, player.y-1500, 3000, 3000);
    ctx.fillStyle = '#333';
    obstacles.forEach(o => {
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = '#444'; ctx.strokeRect(o.x, o.y, o.w, o.h);
    });

    // 敵
    enemies.forEach(e => drawHuman(e.x, e.y, Math.atan2(player.y-e.y, player.x-e.x), '#844', 0));
    
    // 弾
    ctx.fillStyle = '#ff0'; bullets.forEach(b => ctx.fillRect(b.x, b.y, 4, 4));
    ctx.fillStyle = '#f00'; enemyBullets.forEach(eb => ctx.fillRect(eb.x, eb.y, 4, 4));

    ctx.restore();
    if (playerHP > 0) drawHuman(canvas.width / 2, canvas.height * 0.7, Math.PI/2, '#464', player.walkCycle);
    requestAnimationFrame(draw);
}

function drawHuman(x, y, angle, color, walk) {
    ctx.save();
    ctx.translate(x, y); ctx.rotate(angle);
    let sway = Math.sin(walk) * 4;
    ctx.fillStyle = color; ctx.beginPath(); ctx.ellipse(0, 0, 18, 22, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c49c7a'; ctx.beginPath(); ctx.arc(5, 0, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#222'; ctx.fillRect(15, -3 + sway, 28, 6);
    ctx.restore();
}
draw();
</script>
</body>
</html>
