<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tactical Cover Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050a05; font-family: 'Consolas', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; text-shadow: 2px 2px #000; }
        #hp-bar { width: 200px; height: 12px; border: 2px solid #0f0; background: #222; margin: 5px 0; }
        #hp-inner { width: 100%; height: 100%; background: #f00; transition: 0.1s; }
        #wave-info { position: absolute; top: 20px; right: 20px; text-align: right; color: #ff0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h2 style="margin:0">COVER OPERATIVE</h2>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">TOTAL KILLS: 0</p>
        <p style="font-size:0.8em">W/A/S/D: MOVE | CLICK: FIRE</p>
    </div>

    <div id="wave-info">
        <div id="level-display" style="font-size: 1.5em; font-weight: bold;">WAVE 1</div>
        <div id="remaining-display">TARGETS: 5</div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

let score = 0, playerHP = 100, keys = {}, bullets = [], enemyBullets = [], enemies = [], obstacles = [], particles = [];
let currentWave = 1, enemiesToSpawn = 5, enemiesKilledInWave = 0, waveClearTimer = 0;
const player = { x: 0, y: 0, speed: 5, radius: 18 };
let mousePos = { x: 0, y: 0 };

// 障害物の生成（カバーポイント）
function createMap() {
    obstacles = [];
    for(let i=0; i<40; i++) {
        obstacles.push({
            x: (Math.random() - 0.5) * 4000,
            y: (Math.random() - 0.5) * 4000,
            w: 80 + Math.random() * 250,
            h: 80 + Math.random() * 250
        });
    }
}
createMap();

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => { mousePos.x = e.clientX; mousePos.y = e.clientY; });
window.addEventListener('mousedown', e => {
    if (e.button === 0 && playerHP > 0) {
        const ang = Math.atan2(mousePos.y - canvas.height/2, mousePos.x - canvas.width/2);
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(ang) * 20, vy: Math.sin(ang) * 20, life: 50 });
    }
});

// 当たり判定（円と矩形）
function checkCollision(x, y, r) {
    for (let o of obstacles) {
        if (x + r > o.x && x - r < o.x + o.w && y + r > o.y && y - r < o.y + o.h) return true;
    }
    return false;
}

// 弾が壁に当たった時のエフェクト
function createSpark(x, y, color) {
    for(let i=0; i<5; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 10, color: color
        });
    }
}

function update() {
    if (playerHP <= 0) return;

    // プレイヤー移動
    let nx = player.x, ny = player.y;
    if (keys['KeyW']) ny -= player.speed;
    if (keys['KeyS']) ny += player.speed;
    if (keys['KeyA']) nx -= player.speed;
    if (keys['KeyD']) nx += player.speed;
    if (!checkCollision(nx, player.y, player.radius)) player.x = nx;
    if (!checkCollision(player.x, ny, player.radius)) player.y = ny;

    // ウェーブ管理
    if (enemiesKilledInWave >= enemiesToSpawn && waveClearTimer <= 0) waveClearTimer = 120;
    if (waveClearTimer > 0 && --waveClearTimer === 1) {
        currentWave++; enemiesKilledInWave = 0; enemiesToSpawn = 5 + (currentWave * 2);
        playerHP = Math.min(100, playerHP + 25);
        document.getElementById('hp-inner').style.width = playerHP + "%";
        document.getElementById('level-display').innerText = `WAVE ${currentWave}`;
    }
    document.getElementById('remaining-display').innerText = `TARGETS: ${Math.max(0, enemiesToSpawn - enemiesKilledInWave)}`;

    // 敵スポーン（プレイヤーから離れた位置に）
    if (enemies.length < 5 && enemiesKilledInWave + enemies.length < enemiesToSpawn) {
        if (Math.random() < 0.02) {
            const ang = Math.random() * Math.PI * 2;
            let ex = player.x + Math.cos(ang)*800, ey = player.y + Math.sin(ang)*800;
            if (!checkCollision(ex, ey, 20)) {
                enemies.push({ x: ex, y: ey, hp: 100, maxHp: 100, lastShot: Date.now(), flash: 0 });
            }
        }
    }

    // 敵AI（カバーを意識しつつ射撃）
    enemies.forEach(e => {
        const dist = Math.hypot(player.x - e.x, player.y - e.y);
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        
        // プレイヤーに近づきすぎず、遠すぎずの距離を保つ
        if (dist > 400) {
            let vx = Math.cos(ang)*2.5, vy = Math.sin(ang)*2.5;
            if (!checkCollision(e.x + vx, e.y + vy, 20)) { e.x += vx; e.y += vy; }
        } else if (dist < 250) {
            let vx = -Math.cos(ang)*3, vy = -Math.sin(ang)*3;
            if (!checkCollision(e.x + vx, e.y + vy, 20)) { e.x += vx; e.y += vy; }
        }

        // 射撃
        if (Date.now() - e.lastShot > 1800 && dist < 600) {
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(ang)*9, vy: Math.sin(ang)*9, life: 100 });
            e.lastShot = Date.now();
        }
        if (e.flash > 0) e.flash--;
    });

    // 弾丸（自分）
    for(let i=bullets.length-1; i>=0; i--) {
        let b = bullets[i]; b.x += b.vx; b.y += b.vy; b.life--;
        if (checkCollision(b.x, b.y, 5)) { createSpark(b.x, b.y, '#fff'); bullets.splice(i, 1); continue; }
        if (b.life <= 0) { bullets.splice(i, 1); continue; }
        enemies.forEach((e, ei) => {
            if (Math.hypot(e.x-b.x, e.y-b.y) < 25) {
                e.hp -= 34; e.flash = 5; bullets.splice(i, 1);
                if (e.hp <= 0) { enemies.splice(ei, 1); score++; enemiesKilledInWave++; }
            }
        });
    }

    // 弾丸（敵）
    for(let i=enemyBullets.length-1; i>=0; i--) {
        let eb = enemyBullets[i]; eb.x += eb.vx; eb.y += eb.vy; eb.life--;
        if (checkCollision(eb.x, eb.y, 5)) { createSpark(eb.x, eb.y, '#f66'); enemyBullets.splice(i, 1); continue; }
        if (eb.life <= 0) { enemyBullets.splice(i, 1); continue; }
        if (Math.hypot(player.x-eb.x, player.y-eb.y) < 20) {
            playerHP -= 10; document.getElementById('hp-inner').style.width = Math.max(0, playerHP) + "%";
            enemyBullets.splice(i, 1);
            if (playerHP <= 0) location.reload();
        }
    }

    // 火花パーティクル
    particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; if (--p.life <= 0) particles.splice(i, 1); });
}

function draw() {
    update();
    ctx.fillStyle = '#050805'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save(); ctx.translate(canvas.width/2 - player.x, canvas.height/2 - player.y);

    // グリッド
    ctx.strokeStyle = '#112211'; ctx.lineWidth = 1;
    for(let i=-2000; i<=2000; i+=100) {
        ctx.beginPath(); ctx.moveTo(i,-2000); ctx.lineTo(i,2000); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2000,i); ctx.lineTo(2000,i); ctx.stroke();
    }

    // 壁（重要：弾を通さない）
    ctx.fillStyle = '#1a221a'; ctx.strokeStyle = '#3a4a3a'; ctx.lineWidth = 3;
    obstacles.forEach(o => { ctx.fillRect(o.x, o.y, o.w, o.h); ctx.strokeRect(o.x, o.y, o.w, o.h); });

    // プレイヤー
    const shootAng = Math.atan2(mousePos.y - canvas.height/2, mousePos.x - canvas.width/2);
    ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(shootAng);
    ctx.fillStyle = '#0f0'; ctx.beginPath(); ctx.arc(0, 0, player.radius, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0c0'; ctx.fillRect(10, -4, 20, 8); ctx.restore();

    // 敵
    enemies.forEach(e => {
        ctx.fillStyle = e.flash > 0 ? '#fff' : '#f44';
        ctx.beginPath(); ctx.arc(e.x, e.y, 20, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#222'; ctx.fillRect(e.x-25, e.y-35, 50, 6);
        ctx.fillStyle = '#f00'; ctx.fillRect(e.x-25, e.y-35, 50*(e.hp/e.maxHp), 6);
    });

    // 弾とパーティクル
    ctx.fillStyle = '#fff'; bullets.forEach(b => ctx.fillRect(b.x-3, b.y-3, 6, 6));
    ctx.fillStyle = '#f66'; enemyBullets.forEach(eb => ctx.fillRect(eb.x-3, eb.y-3, 6, 6));
    particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x-2, p.y-2, 4, 4); });

    ctx.restore();
    if (waveClearTimer > 0) {
        ctx.fillStyle = '#ff0'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
        ctx.fillText("WAVE CLEAR - AMMO RELOADED", canvas.width/2, canvas.height/2);
    }
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
