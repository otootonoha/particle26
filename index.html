<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tactical FPS - Refined Vision</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050805; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #5f5; pointer-events: none; text-shadow: 2px 2px #000; z-index: 10; }
        #hp-bar { width: 250px; height: 15px; border: 2px solid #5f5; margin-top: 10px; background: #111; }
        #hp-inner { width: 100%; height: 100%; background: #f22; transition: 0.1s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.5); }
        #crosshair::after { content: ''; position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: rgba(0, 255, 0, 0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <h2>SECTOR 7 - REFINED VISION</h2>
        <p>CLICK TO START | WASD TO MOVE | MOUSE TO LOOK</p>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">KILLS: 0</p>
    </div>
    <div id="crosshair"></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const hpInner = document.getElementById('hp-inner');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- 設定 ---
const SENSITIVITY = 0.0025;
const MAP_SIZE = 5000;
const FOV = 1.2; // 数値を大きくして視点を広く・遠くしました
let score = 0;
let playerHP = 100;
let recoil = 0;
let keys = {};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let obstacles = [];

const player = { x: 0, y: 0, angle: 0, speed: 5.0, radius: 20 };

// 障害物生成
for(let i=0; i<40; i++) {
    obstacles.push({
        x: (Math.random() - 0.5) * MAP_SIZE,
        y: (Math.random() - 0.5) * MAP_SIZE,
        w: 150 + Math.random() * 250,
        h: 150 + Math.random() * 250,
        color: `hsl(120, 10%, ${10 + Math.random() * 10}%)`
    });
}

function checkCollision(x, y, r = 5) {
    for (let o of obstacles) {
        if (x + r > o.x && x - r < o.x + o.w && y + r > o.y && y - r < o.y + o.h) return true;
    }
    return false;
}

function getSafeLocation() {
    let x, y, attempts = 0;
    while(attempts < 20) {
        let ang = Math.random() * Math.PI * 2;
        let dist = 1000 + Math.random() * 1000;
        x = player.x + Math.cos(ang) * dist;
        y = player.y + Math.sin(ang) * dist;
        if (!checkCollision(x, y, 40)) return { x, y };
        attempts++;
    }
    return { x: 2000, y: 2000 };
}

// --- 入力系 ---
canvas.addEventListener('click', () => canvas.requestPointerLock());
window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        player.angle += e.movementX * SENSITIVITY;
    }
});
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousedown', () => {
    if (document.pointerLockElement === canvas && playerHP > 0) {
        bullets.push({ x: player.x, y: player.y, angle: player.angle, speed: 50, dist: 0 });
        recoil = 15;
    }
});

function getRelative(tx, ty) {
    let dx = tx - player.x;
    let dy = ty - player.y;
    // 視点変更を反映させるための回転行列
    let rotX = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let rotZ = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle);
    return { x: rotX, z: rotZ };
}

function update() {
    if (playerHP <= 0) return;

    // プレイヤー移動
    let mx = 0, my = 0;
    if (keys['KeyW']) { mx += Math.cos(player.angle); my += Math.sin(player.angle); }
    if (keys['KeyS']) { mx -= Math.cos(player.angle); my -= Math.sin(player.angle); }
    if (keys['KeyA']) { mx += Math.sin(player.angle); my -= Math.cos(player.angle); }
    if (keys['KeyD']) { mx -= Math.sin(player.angle); my += Math.cos(player.angle); }
    
    let nx = player.x + mx * player.speed;
    let ny = player.y + my * player.speed;
    if (!checkCollision(nx, player.y, player.radius)) player.x = nx;
    if (!checkCollision(player.x, ny, player.radius)) player.y = ny;
    
    recoil *= 0.8;

    // 弾丸処理
    bullets.forEach((b, i) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        b.dist += b.speed;
        if (b.dist > 3000 || checkCollision(b.x, b.y, 2)) bullets.splice(i, 1);
        enemies.forEach((e, ei) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < 40) {
                enemies.splice(ei, 1);
                bullets.splice(i, 1);
                score++;
                scoreEl.innerText = `KILLS: ${score}`;
            }
        });
    });

    enemyBullets.forEach((eb, i) => {
        eb.x += Math.cos(eb.angle) * eb.speed;
        eb.y += Math.sin(eb.angle) * eb.speed;
        if (checkCollision(eb.x, eb.y, 2)) enemyBullets.splice(i, 1);
        if (Math.hypot(player.x - eb.x, player.y - eb.y) < 30) {
            playerHP -= 5;
            hpInner.style.width = Math.max(0, playerHP) + "%";
            enemyBullets.splice(i, 1);
            if (playerHP <= 0) location.reload();
        }
    });

    // 敵スポーン
    if (enemies.length < 15 && Math.random() < 0.04) {
        let p = getSafeLocation();
        enemies.push({ x: p.x, y: p.y, lastShot: Date.now() });
    }

    // 敵AI
    enemies.forEach(e => {
        let d = Math.hypot(player.x - e.x, player.y - e.y);
        let ang = Math.atan2(player.y - e.y, player.x - e.x);
        if (d > 500) {
            let vx = Math.cos(ang) * 2.2;
            let vy = Math.sin(ang) * 2.2;
            if (!checkCollision(e.x + vx, e.y + vy, 20)) { e.x += vx; e.y += vy; }
        } else if (Date.now() - e.lastShot > 1500) {
            enemyBullets.push({ x: e.x, y: e.y, angle: ang, speed: 15 });
            e.lastShot = Date.now();
        }
    });
}

function draw() {
    update();
    
    // 背景
    ctx.fillStyle = '#050805'; ctx.fillRect(0, 0, canvas.width, canvas.height/2);
    ctx.fillStyle = '#080d08'; ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

    let drawList = [];
    obstacles.forEach(o => {
        let rel = getRelative(o.x + o.w/2, o.y + o.h/2);
        if (rel.z > 50) drawList.push({ type: 'box', ...rel, w: o.w, h: o.h, color: o.color });
    });
    enemies.forEach(e => {
        let rel = getRelative(e.x, e.y);
        if (rel.z > 20) drawList.push({ type: 'enemy', ...rel });
    });
    bullets.concat(enemyBullets).forEach(b => {
        let rel = getRelative(b.x, b.y);
        if (rel.z > 10) drawList.push({ type: 'bullet', ...rel, color: b.speed > 20 ? '#ff0' : '#f00' });
    });

    drawList.sort((a, b) => b.z - a.z);

    drawList.forEach(obj => {
        let scale = (canvas.width / FOV) / obj.z;
        let screenX = obj.x * scale + canvas.width / 2;
        let horizon = canvas.height / 2;

        if (obj.type === 'box') {
            let w = obj.w * scale;
            let h = 1000 * scale; // 壁の高さ
            ctx.fillStyle = obj.color;
            ctx.fillRect(screenX - w/2, horizon - h, w, h);
            ctx.strokeStyle = '#1a331a'; ctx.strokeRect(screenX - w/2, horizon - h, w, h);
        } else if (obj.type === 'enemy') {
            let h = 130 * scale; // 敵の高さ
            let w = 60 * scale;  // 敵の幅を細くして調整
            ctx.fillStyle = '#833';
            ctx.fillRect(screenX - w/2, horizon - h, w, h);
            ctx.fillStyle = '#f00'; ctx.fillRect(screenX - w/3, horizon - h*0.8, w/1.5, h/10);
        } else if (obj.type === 'bullet') {
            let s = 10 * scale;
            ctx.fillStyle = obj.color;
            ctx.beginPath(); ctx.arc(screenX, horizon - 30 * scale, s, 0, Math.PI*2); ctx.fill();
        }
    });

    // 銃の描画
    ctx.save();
    let gx = canvas.width * 0.7, gy = canvas.height - 180 + recoil;
    ctx.fillStyle = '#111'; ctx.fillRect(gx - 35, gy, 70, 300);
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(gx - 30, gy - 20, 60, 50);
    if (recoil > 10) {
        ctx.fillStyle = 'rgba(255,255,100,0.5)';
        ctx.beginPath(); ctx.arc(gx, gy - 30, 40, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
