<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3rd Person Shooter - Fixed Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; z-index: 10; }
        #hp-bar { width: 200px; height: 10px; border: 2px solid #0f0; background: #222; }
        #hp-inner { width: 100%; height: 100%; background: #f00; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="ui">
        <h3>TPS MODE ACTIVE</h3>
        <div id="hp-bar"><div id="hp-inner"></div></div>
        <p id="score">KILLS: 0</p>
    </div>
    <div id="crosshair"></div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- ゲーム設定 ---
const SENSITIVITY = 0.003;
const FOV = 1.0;
let score = 0;
let playerHP = 100;
let keys = {};
let bullets = [];
let enemyBullets = [];
let enemies = [];
let damageTexts = [];

const player = { x: 0, y: 0, angle: 0, speed: 8, radius: 25 };

// キー入力の状態を確実に保持
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// マウス移動で視点回転
canvas.addEventListener('click', () => canvas.requestPointerLock());
window.addEventListener('mousemove', e => {
    if (document.pointerLockElement === canvas) {
        player.angle += e.movementX * SENSITIVITY;
    }
});

// 左クリック射撃
window.addEventListener('mousedown', e => {
    if (document.pointerLockElement === canvas && e.button === 0 && playerHP > 0) {
        bullets.push({ 
            x: player.x, 
            y: player.y, 
            angle: player.angle, 
            speed: 80, 
            dist: 0 
        });
    }
});

function getRelative(tx, ty) {
    let dx = tx - player.x, dy = ty - player.y;
    // 三人称視点のため、プレイヤーの少し後ろにカメラを配置
    let camOffsetZ = -200; 
    let rotX = dx * Math.cos(-player.angle) - dy * Math.sin(-player.angle);
    let rotZ = dx * Math.sin(-player.angle) + dy * Math.cos(-player.angle) - camOffsetZ;
    return { x: rotX, z: rotZ };
}

function update() {
    if (playerHP <= 0) return;

    // 移動処理 (W:前, S:後, A:左, D:右)
    let moveX = 0, moveY = 0;
    if (keys['KeyW']) { moveX += Math.cos(player.angle); moveY += Math.sin(player.angle); }
    if (keys['KeyS']) { moveX -= Math.cos(player.angle); moveY -= Math.sin(player.angle); }
    if (keys['KeyA']) { moveX += Math.sin(player.angle); moveY -= Math.cos(player.angle); }
    if (keys['KeyD']) { moveX -= Math.sin(player.angle); moveY += Math.cos(player.angle); }
    
    player.x += moveX * player.speed;
    player.y += moveY * player.speed;

    // 弾の処理
    bullets.forEach((b, i) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        b.dist += b.speed;
        if (b.dist > 3000) bullets.splice(i, 1);

        enemies.forEach((e, ei) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < 50) {
                e.hp -= 34;
                e.hit = 5;
                damageTexts.push({ x: e.x, y: e.y, val: 34, life: 20 });
                bullets.splice(i, 1);
                if (e.hp <= 0) { enemies.splice(ei, 1); score++; document.getElementById('score').innerText = `KILLS: ${score}`; }
            }
        });
    });

    // 敵の生成
    if (enemies.length < 8 && Math.random() < 0.03) {
        let spawnAng = player.angle + (Math.random() - 0.5) * 2;
        enemies.push({
            x: player.x + Math.cos(spawnAng) * 1500,
            y: player.y + Math.sin(spawnAng) * 1500,
            hp: 100, maxHp: 100, hit: 0
        });
    }

    damageTexts.forEach((t, i) => { t.life--; if (t.life <= 0) damageTexts.splice(i, 1); });
}

function draw() {
    update();
    
    // 背景（床と空）
    let horizon = canvas.height / 2;
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, canvas.width, horizon);
    ctx.fillStyle = '#222'; ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);

    let drawList = [];

    // プレイヤー自身（三人称視点なので描画する）
    let pRel = getRelative(player.x, player.y);
    if (pRel.z > 10) drawList.push({ type: 'player', ...pRel });

    // 敵
    enemies.forEach(e => {
        let rel = getRelative(e.x, e.y);
        if (rel.z > 50) drawList.push({ type: 'enemy', ...rel, hp: e.hp, maxHp: e.maxHp, hit: e.hit });
    });

    // 弾
    bullets.forEach(b => {
        let rel = getRelative(b.x, b.y);
        if (rel.z > 20) drawList.push({ type: 'bullet', ...rel });
    });

    // Zソート（奥から順に描画）
    drawList.sort((a, b) => b.z - a.z);

    drawList.forEach(obj => {
        let scale = (canvas.width / FOV) / obj.z;
        let screenX = obj.x * scale + canvas.width / 2;
        let screenY = horizon + (100 * scale); // 地面からの高さ調整

        if (obj.type === 'player') {
            ctx.fillStyle = '#0f0';
            ctx.fillRect(screenX - 25 * scale, screenY - 80 * scale, 50 * scale, 80 * scale);
        } else if (obj.type === 'enemy') {
            ctx.fillStyle = obj.hit > 0 ? '#fff' : '#f44';
            let h = 120 * scale;
            ctx.fillRect(screenX - 40 * scale, screenY - h, 80 * scale, h);
            
            // 敵HPバー
            ctx.fillStyle = '#000';
            ctx.fillRect(screenX - 50 * scale, screenY - h - 30 * scale, 100 * scale, 10 * scale);
            ctx.fillStyle = '#f00';
            ctx.fillRect(screenX - 50 * scale, screenY - h - 30 * scale, (100 * scale) * (obj.hp/obj.maxHp), 10 * scale);
        } else if (obj.type === 'bullet') {
            ctx.fillStyle = '#ff0';
            ctx.beginPath(); ctx.arc(screenX, screenY - 40 * scale, 8 * scale, 0, Math.PI*2); ctx.fill();
        }
    });

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
